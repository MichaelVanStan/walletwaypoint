slug: budget
title: "Budget Calculator"
description: "Break down your income using the 50/30/20 rule."
category: budget

inputs:
  primary:
    - name: monthlyIncome
      label: "Monthly Income"
      type: currency
      min: 1000
      max: 50000
      step: 100
      default: 7000
      urlKey: income
      hint: "US median household: ~$7,000/mo"

charts:
  - type: pie
    title: "50/30/20 Budget Allocation"
    dataKey: budgetAllocation
  - type: bar
    title: "Your Budget vs US Average"
    dataKey: comparison

outputs:
  - key: needs
    label: "Needs (50%)"
    format: currency
    primary: true
  - key: wants
    label: "Wants (30%)"
    format: currency
  - key: savings
    label: "Savings (20%)"
    format: currency
  - key: annualIncome
    label: "Annual Income"
    format: currency

callouts:
  - title: "Track your spending"
    href: "/guides/budget"
  - title: "Cut unnecessary subscriptions"
    href: "/guides/savings-goal"
  - title: "Build an emergency fund"
    href: "/guides/rent-affordability"

interpretation:
  template: budget
  contextLabel: "50/30/20 budget breakdown"

mathModule: budget

faqs:
  - question: "What is the 50/30/20 budget rule?"
    answer: "The 50/30/20 rule divides your after-tax income into three categories: 50% for needs (housing, food, transportation), 30% for wants (entertainment, dining out, hobbies), and 20% for savings and debt repayment. It's a simple starting framework, not a rigid rule."
  - question: "How do I budget if I have irregular income?"
    answer: "Calculate your average monthly income over the past 6-12 months and budget based on that. In higher-earning months, save the surplus. In lower months, you'll have a buffer. Some freelancers prefer budgeting based on their lowest-earning month for safety."
  - question: "What counts as a need vs a want?"
    answer: "Needs are expenses you must pay regardless: rent, groceries, utilities, minimum debt payments, insurance, and transportation to work. Wants are everything else: streaming services, dining out, gym memberships, and upgrades beyond the basics."
  - question: "Should I include taxes in my 50/30/20 budget?"
    answer: "No -- the 50/30/20 rule applies to your after-tax income (take-home pay). If you're self-employed, set aside your estimated taxes first, then apply the rule to what's left."

narrative:
  heroKey: needs
  heroLabel: "Your 50/30/20 Breakdown"
  sections:
    - label: "Budget Allocation"
      color: green
      content: chart
      chartKey: budgetAllocation
    - label: "Your Budget at a Glance"
      color: blue
      content: stats
      statKeys: ["wants", "savings", "annualIncome"]

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

slug: loan-repayment
title: "Loan Repayment Calculator"
description: "See your payoff timeline and how extra payments save you money."
category: loans

inputs:
  primary:
    - name: loanAmount
      label: "Loan Amount"
      type: currency
      min: 1000
      max: 500000
      step: 1000
      default: 25000
      urlKey: amount
      hint: "Typical personal/auto loan"
    - name: interestRate
      label: "Interest Rate"
      type: percent
      min: 1
      max: 30
      step: 0.25
      default: 8
      urlKey: rate
      hint: "Avg personal loan: ~8%"
    - name: loanTerm
      label: "Loan Term"
      type: years
      min: 1
      max: 30
      step: 1
      default: 5
      urlKey: term
      hint: "Common: 3-7 years"
    - name: extraPayment
      label: "Extra Payment"
      type: currency
      min: 0
      max: 5000
      step: 25
      default: 0
      urlKey: extra
      hint: "Extra monthly principal"

charts:
  - type: area
    title: "Loan Balance Over Time"
    dataKey: balanceOverTime

outputs:
  - key: monthlyPayment
    label: "Base Payment"
    format: currency
    primary: true
  - key: totalMonthlyPayment
    label: "Total Monthly Payment"
    format: currency
  - key: totalInterest
    label: "Total Interest"
    format: currency
  - key: totalCost
    label: "Total Cost"
    format: currency
  - key: payoffMonths
    label: "Payoff Months"
    format: number
  - key: monthsSaved
    label: "Months Saved"
    format: number
  - key: interestSaved
    label: "Interest Saved"
    format: currency

callouts:
  - title: "Make extra payments"
    href: "/guides/loan-repayment"
  - title: "Refinance options"
    href: "/guides/student-loan"
  - title: "Debt payoff strategies"
    href: "/guides/budget"

interpretation:
  template: loan-repayment
  contextLabel: "total cost"

mathModule: loan

faqs:
  - question: "Does making extra payments on a loan save money?"
    answer: "Yes -- extra payments go directly toward principal, reducing the balance that accrues interest. Even small additional payments can save hundreds or thousands in interest and shorten your payoff timeline by months or years."
  - question: "Should I pay off my loan early or invest the money?"
    answer: "Compare your loan's interest rate to expected investment returns. If your loan is at 4% and you expect 7% investment returns, investing may be better mathematically. But paying off debt provides guaranteed savings and psychological relief -- both are valid strategies."
  - question: "What is amortization?"
    answer: "Amortization is the process of spreading a loan into equal monthly payments where each one covers both principal and interest. In the early months, most of your payment goes to interest. Over time, more goes toward principal as the balance shrinks."
  - question: "Is it better to refinance or make extra payments?"
    answer: "Refinancing to a lower rate reduces the cost of every remaining payment. Extra payments attack the principal directly. If rates have dropped significantly since you took the loan, refinancing first and then making extra payments gives you the best of both worlds."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

slug: rent-vs-buy
title: "Rent vs. Buy Calculator"
description: "Compare the total cost of renting versus buying over time."
category: home

inputs:
  primary:
    - name: monthlyRent
      label: "Monthly Rent"
      type: currency
      min: 500
      max: 10000
      step: 50
      default: 1800
      urlKey: rent
      hint: "Current/expected rent"
    - name: homePrice
      label: "Home Price"
      type: currency
      min: 50000
      max: 2000000
      step: 5000
      default: 415000
      urlKey: price
      hint: "US median: $415K"
    - name: downPayment
      label: "Down Payment"
      type: percent
      min: 0
      max: 50
      step: 1
      default: 20
      urlKey: dp
    - name: mortgageRate
      label: "Mortgage Rate"
      type: percent
      min: 1
      max: 15
      step: 0.125
      default: 6.5
      urlKey: rate
    - name: timeHorizon
      label: "Time Horizon"
      type: years
      min: 1
      max: 30
      step: 1
      default: 30
      urlKey: years
      hint: "Full mortgage term: 30 years"
  advanced:
    - name: homeAppreciation
      label: "Home Appreciation"
      type: percent
      min: 0
      max: 10
      step: 0.5
      default: 3
      urlKey: appreciation
      hint: "Historical avg: ~3%"
      tooltip: "Annual property value growth rate. The US historical average is ~3%, but varies significantly by location and market conditions."
    - name: annualRentIncrease
      label: "Annual Rent Increase"
      type: percent
      min: 0
      max: 10
      step: 0.5
      default: 3
      urlKey: rentIncrease
      hint: "Typical: 2-4%"

charts:
  - type: area
    title: "Cumulative Cost Over Time"
    dataKey: cumulativeCost
  - type: line
    title: "Net Cost (After Equity & Investments)"
    dataKey: netPosition

outputs:
  - key: totalRentCost
    label: "Total Rent Cost"
    format: currency
    deltaSemantic: neutral
  - key: totalBuyCost
    label: "Total Buy Cost"
    format: currency
    deltaSemantic: neutral
  - key: netRentCost
    label: "Net Rent Cost"
    format: currency
    primary: true
  - key: netBuyCost
    label: "Net Buy Cost"
    format: currency
  - key: savingsAmount
    label: "Savings"
    format: currency
    deltaSemantic: higher_is_better

callouts:
  - title: "Calculate closing costs"
    href: "/guides/rent-vs-buy"
  - title: "Understand opportunity cost"
    href: "/guides/mortgage-payment"
  - title: "Check first-time buyer programs"
    href: "/guides/rent-affordability"

interpretation:
  template: rent-vs-buy
  contextLabel: "net cost comparison"

mathModule: rent-vs-buy

faqs:
  - question: "Is it cheaper to rent or buy a home?"
    answer: "It depends on where you live, how long you'll stay, and current mortgage rates. Generally, buying becomes cheaper than renting after 5-7 years in the same location due to equity building and fixed payments. In expensive markets with low rent-to-price ratios, renting may be better indefinitely."
  - question: "How long should I plan to stay before buying makes sense?"
    answer: "Most financial analysts recommend planning to stay at least 5 years. The upfront costs of buying (closing costs, moving, repairs) typically take 3-7 years to recoup through equity and appreciation. If you might move sooner, renting usually wins."
  - question: "What are closing costs when buying a home?"
    answer: "Closing costs typically run 2-5% of the home price and include loan origination fees, appraisal, title insurance, attorney fees, and prepaid taxes/insurance. On a $400,000 home, expect $8,000-$20,000 in closing costs on top of your down payment."
  - question: "Does renting mean throwing money away?"
    answer: "No -- rent buys you housing, flexibility, and freedom from maintenance costs. Homeowners also 'throw away' money on interest, property taxes, insurance, and maintenance. The real question is whether the equity you build outweighs the extra costs of ownership in your specific situation."

narrative:
  heroKey: savingsAmount
  heroLabel: "Your Potential Savings"
  sections:
    - label: "Cost Comparison"
      color: orange
      content: stats
      statKeys: ["totalRentCost", "totalBuyCost", "netRentCost", "netBuyCost"]
    - label: "Cumulative Cost Over Time"
      color: blue
      content: chart
      chartKey: cumulativeCost
    - label: "Net Position Over Time"
      color: green
      content: chart
      chartKey: netPosition

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

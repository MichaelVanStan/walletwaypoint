slug: home-affordability
title: "Home Affordability Calculator"
description: "Find out how much house you can afford based on your income, debts, and down payment."
category: home

inputs:
  primary:
    - name: annualIncome
      label: "Annual Gross Income"
      type: currency
      min: 20000
      max: 500000
      step: 5000
      default: 75000
      urlKey: income
      hint: "Before taxes"
    - name: monthlyDebts
      label: "Monthly Debt Payments"
      type: currency
      min: 0
      max: 10000
      step: 50
      default: 500
      urlKey: debts
      hint: "Car loans, student loans, credit cards"
      tooltip: "Include all recurring monthly debt payments: car loans, student loans, credit card minimums, personal loans. Do not include rent or utilities."
    - name: downPayment
      label: "Down Payment"
      type: percent
      min: 0
      max: 50
      step: 1
      default: 20
      urlKey: dp
      hint: "Typical: 10-20%"
    - name: interestRate
      label: "Interest Rate"
      type: percent
      min: 1
      max: 15
      step: 0.125
      default: 6.5
      urlKey: rate
      hint: "Current avg: ~6.5%"

charts:
  - type: bar
    title: "Affordability by Tier"
    dataKey: tierComparison

outputs:
  - key: conservativePrice
    label: "Conservative (28/36)"
    format: currency
    primary: true
  - key: conservativePayment
    label: "Monthly Payment"
    format: currency
  - key: moderatePrice
    label: "Moderate (30/43)"
    format: currency
  - key: moderatePayment
    label: "Monthly Payment"
    format: currency
  - key: aggressivePrice
    label: "Aggressive (35/50)"
    format: currency
  - key: aggressivePayment
    label: "Monthly Payment"
    format: currency

callouts:
  - title: "Get pre-approved for a mortgage"
    href: "/guides/mortgage-payment"
  - title: "Compare rent vs buying"
    href: "/calculators/rent-vs-buy"
  - title: "Compare mortgage lenders"
    href: "/compare/personal-loans"

interpretation:
  template: home-affordability
  contextLabel: "of your gross income"

mathModule: home-affordability

faqs:
  - question: "What is the 28/36 rule for home buying?"
    answer: "The 28/36 rule says your monthly housing costs should not exceed 28% of your gross income (front-end ratio), and your total debt payments should not exceed 36% (back-end ratio). This is the conservative standard most financial advisors recommend."
  - question: "How much house can I afford on a $75,000 salary?"
    answer: "Using the conservative 28/36 rule with 20% down and a 6.5% rate, a $75,000 salary typically supports a home price around $275,000-$300,000, depending on your existing debts. Use the calculator above to see your personalized range."
  - question: "Does my down payment affect how much house I can afford?"
    answer: "Yes -- a larger down payment means a smaller loan, which means lower monthly payments and potentially a better interest rate. With 20% down, you also avoid private mortgage insurance (PMI), saving $100-$300 per month on a typical mortgage."
  - question: "What debts do lenders consider in the DTI calculation?"
    answer: "Lenders count all recurring monthly debt payments: car loans, student loans, credit card minimum payments, personal loans, child support, and alimony. They typically do NOT count utilities, insurance (non-mortgage), subscriptions, or cell phone bills."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

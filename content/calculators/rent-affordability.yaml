slug: rent-affordability
title: "Rent Affordability Calculator"
description: "Find out how much rent fits your income and expenses."
category: home

inputs:
  primary:
    - name: monthlyIncome
      label: "Monthly Income"
      type: currency
      min: 1000
      max: 30000
      step: 100
      default: 5500
      urlKey: income
      hint: "US median individual: ~$5,500/mo"
    - name: maxRentPercent
      label: "Max Rent Percent"
      type: percent
      min: 10
      max: 50
      step: 1
      default: 28
      urlKey: maxPct
      hint: "Standard guideline: 28%"
    - name: utilities
      label: "Utilities"
      type: currency
      min: 0
      max: 1000
      step: 25
      default: 200
      urlKey: utilities
    - name: otherExpenses
      label: "Other Expenses"
      type: currency
      min: 0
      max: 2000
      step: 50
      default: 300
      urlKey: other

charts:
  - type: pie
    title: "Income Allocation"
    dataKey: incomeAllocation

outputs:
  - key: maxRent
    label: "Max Rent"
    format: currency
    primary: true
  - key: affordableRent
    label: "Affordable Rent"
    format: currency
  - key: monthlyRemaining
    label: "Monthly Remaining"
    format: currency
  - key: annualRentCost
    label: "Annual Rent Cost"
    format: currency

callouts:
  - title: "Reduce monthly expenses"
    href: "/guides/rent-affordability"
  - title: "Negotiate your lease"
    href: "/guides/budget"
  - title: "Find affordable areas"
    href: "/guides/rent-vs-buy"

interpretation:
  template: rent-affordability
  contextLabel: "% of monthly income"

mathModule: rent-affordability

faqs:
  - question: "How much of my income should go to rent?"
    answer: "The general guideline is to spend no more than 28-30% of your gross monthly income on rent. If you earn $4,500 per month before taxes, aim for $1,260-$1,350 maximum. In expensive cities, some stretch to 35%, but this leaves less room for savings and emergencies."
  - question: "What is the 30% rent rule?"
    answer: "The 30% rule suggests spending no more than 30% of your gross (pre-tax) monthly income on housing costs. This guideline originated from the U.S. Department of Housing and Urban Development (HUD). It's a useful starting point, but your ideal number depends on your other expenses and savings goals."
  - question: "Should I include utilities in my rent budget?"
    answer: "Yes -- your total housing cost includes rent plus utilities (electricity, water, gas, internet). When budgeting, add estimated utilities to the rent price to see the true cost. Ask the landlord or previous tenant about typical utility costs before signing."
  - question: "Can I afford to live alone or should I get roommates?"
    answer: "If rent for a solo apartment exceeds 30% of your income, roommates are a smart financial move. Splitting a two-bedroom often saves 25-40% compared to a studio or one-bedroom. Run both scenarios through the calculator to see the actual difference."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

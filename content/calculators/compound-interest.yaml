slug: compound-interest
title: "Compound Interest Calculator"
description: "Watch your money grow over time with regular contributions."
category: savings

inputs:
  primary:
    - name: initialDeposit
      label: "Initial Deposit"
      type: currency
      min: 0
      max: 1000000
      step: 1000
      default: 10000
      urlKey: initial
      hint: "Your starting amount"
    - name: monthlyContribution
      label: "Monthly Contribution"
      type: currency
      min: 0
      max: 10000
      step: 50
      default: 500
      urlKey: monthly
      hint: "Typical monthly savings"
    - name: annualReturn
      label: "Annual Return"
      type: percent
      min: 0
      max: 20
      step: 0.5
      default: 7
      urlKey: rate
      hint: "S&P 500 avg: ~7%"
      tooltip: "Expected yearly investment growth. Index funds average ~7% after inflation historically, but returns vary year to year."
    - name: timeHorizon
      label: "Time Horizon"
      type: years
      min: 1
      max: 50
      step: 1
      default: 20
      urlKey: years

charts:
  - type: area
    title: "Investment Growth Over Time"
    dataKey: growth

outputs:
  - key: futureValue
    label: "Future Value"
    format: currency
    primary: true
  - key: totalContributions
    label: "Total Contributions"
    format: currency
  - key: totalInterestEarned
    label: "Total Interest Earned"
    format: currency

callouts:
  - title: "Start investing early"
    href: "/guides/compound-interest"
  - title: "Increase contributions"
    href: "/guides/savings-goal"
  - title: "Choose the right account"
    href: "/guides/retirement"

interpretation:
  template: compound-interest
  contextLabel: "earned on contributions"

mathModule: compound-interest

faqs:
  - question: "What is compound interest and how does it work?"
    answer: "Compound interest means you earn interest on both your original deposit and on the interest you've already earned. Over time, this creates a snowball effect where your money grows exponentially rather than linearly."
  - question: "How often should interest compound?"
    answer: "The more frequently interest compounds, the faster your money grows. Daily compounding earns slightly more than monthly, which earns more than annually. For savings accounts, look for daily compounding. The difference is small in the short term but significant over decades."
  - question: "What is the Rule of 72?"
    answer: "The Rule of 72 is a quick way to estimate how long it takes to double your money. Divide 72 by your annual interest rate. At 7% annual returns, your money doubles in about 10.3 years (72 / 7 = 10.3)."
  - question: "How much should I invest monthly to become a millionaire?"
    answer: "At a 7% average annual return, investing $550 per month starting at age 25 would give you about $1 million by age 60. Starting at 35, you'd need roughly $1,100 per month. The key takeaway: starting early matters more than the amount."

narrative:
  heroKey: futureValue
  heroLabel: "Your Future Value"
  sections:
    - label: "Growth vs Contributions"
      color: green
      content: stats
      statKeys: ["totalContributions", "totalInterestEarned"]
    - label: "Investment Growth Over Time"
      color: blue
      content: chart
      chartKey: growth
  tip: "Increasing your monthly contribution by even $50 can add tens of thousands over decades thanks to compounding."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

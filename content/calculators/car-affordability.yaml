slug: car-affordability
title: "Car Affordability & Auto Loan Calculator"
description: "Find out how much car you can afford and calculate your auto loan monthly payment."
category: auto

inputs:
  primary:
    - name: monthlyIncome
      label: "Monthly Take-Home Pay"
      type: currency
      min: 1000
      max: 30000
      step: 100
      default: 4500
      urlKey: income
      hint: "After taxes"
    - name: vehiclePrice
      label: "Vehicle Price"
      type: currency
      min: 5000
      max: 150000
      step: 500
      default: 35000
      urlKey: price
      hint: "MSRP or asking price"
    - name: downPayment
      label: "Down Payment"
      type: currency
      min: 0
      max: 50000
      step: 500
      default: 5000
      urlKey: down
      hint: "Typical: 10-20%"
    - name: loanRate
      label: "Loan APR"
      type: percent
      min: 0
      max: 25
      step: 0.1
      default: 6.84
      urlKey: rate
      hint: "Avg new: ~6.8%"
    - name: loanTerm
      label: "Loan Term"
      type: years
      min: 2
      max: 7
      step: 1
      default: 5
      urlKey: term
      hint: "3-5 years recommended"
      unitToggle:
        primary:
          label: "Years"
          suffix: "yr"
        alternate:
          label: "Months"
          suffix: "mo"
          multiplier: 12

charts:
  - type: bar
    title: "How Much Car Can You Afford?"
    dataKey: affordabilityTiers
  - type: pie
    title: "Total Cost Breakdown"
    dataKey: loanBreakdown

outputs:
  - key: conservativePrice
    label: "Conservative (10%)"
    format: currency
  - key: moderatePrice
    label: "Moderate (12%)"
    format: currency
  - key: aggressivePrice
    label: "Aggressive (15%)"
    format: currency
  - key: monthlyPayment
    label: "Monthly Payment"
    format: currency
    primary: true
  - key: totalInterest
    label: "Total Interest"
    format: currency
  - key: totalCost
    label: "Total Cost"
    format: currency

callouts:
  - title: "Compare auto loan rates"
    href: "/compare/personal-loans"
  - title: "Budget for your car purchase"
    href: "/calculators/budget"

interpretation:
  template: car-affordability
  contextLabel: "of your take-home pay"

mathModule: car-affordability

faqs:
  - question: "How much should I spend on a car based on my income?"
    answer: "The 10-15% rule suggests your total monthly car costs (payment, insurance, gas, maintenance) should not exceed 10-15% of your monthly take-home pay. On a $4,500 monthly income, that's $450-$675 per month for all car-related expenses, not just the payment."
  - question: "How long should my auto loan be?"
    answer: "Financial advisors recommend 3-5 year terms (36-60 months). Longer loans (72-84 months) have lower monthly payments but cost significantly more in total interest. A 72-month loan at 7% adds roughly $2,500 more in interest compared to a 48-month loan on a $30,000 car."
  - question: "Should I buy new or used to save money?"
    answer: "A 2-3 year old used car typically costs 20-30% less than new while still having modern safety features and remaining warranty. New cars depreciate fastest in years 1-3. Consider certified pre-owned (CPO) vehicles for the best balance of value and peace of mind."
  - question: "Is 0% financing really free?"
    answer: "0% APR deals save you real money on interest, but they sometimes come instead of cash rebates. Compare total cost both ways: a $2,000 rebate with a 5% loan might be cheaper than 0% APR with no rebate, depending on the loan term. Also, 0% offers typically require excellent credit (740+)."

narrative:
  heroKey: moderatePrice
  heroLabel: "Your Comfortable Budget"
  sections:
    - label: "Affordability Tiers"
      color: green
      content: stats
      statKeys: ["conservativePrice", "moderatePrice", "aggressivePrice"]
    - label: "Total Cost Breakdown"
      color: orange
      content: chart
      chartKey: loanBreakdown

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

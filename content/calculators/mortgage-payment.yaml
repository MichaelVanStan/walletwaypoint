slug: mortgage-payment
title: "Mortgage Payment Calculator"
description: "See your monthly payment, total interest, and full amortization schedule."
category: home

inputs:
  primary:
    - name: homePrice
      label: "Home Price"
      type: currency
      min: 50000
      max: 2000000
      step: 5000
      default: 415000
      urlKey: price
      hint: "US median: $415K"
    - name: downPayment
      label: "Down Payment"
      type: percent
      min: 0
      max: 50
      step: 1
      default: 20
      urlKey: dp
      hint: "Typical: 10-20%"
    - name: interestRate
      label: "Interest Rate"
      type: percent
      min: 1
      max: 15
      step: 0.125
      default: 6.5
      urlKey: rate
      hint: "Current avg: ~6.5%"
    - name: loanTerm
      label: "Loan Term"
      type: years
      min: 10
      max: 30
      step: 5
      default: 30
      urlKey: term
      hint: "Standard: 15 or 30 years"
      unitToggle:
        primary:
          label: "Years"
          suffix: "yr"
        alternate:
          label: "Months"
          suffix: "mo"
          multiplier: 12
  advanced:
    - name: propertyTax
      label: "Property Tax Rate"
      type: percent
      min: 0
      max: 5
      step: 0.1
      default: 1.1
      urlKey: tax
      tooltip: "Annual property tax as a percentage of home value. Ranges from 0.4% to 2.5% depending on state. Check your county assessor's website for local rates."
    - name: insurance
      label: "Annual Insurance"
      type: currency
      min: 0
      max: 10000
      step: 100
      default: 1500
      urlKey: ins

charts:
  - type: area
    title: "Principal vs Interest Over Time"
    dataKey: amortization
  - type: pie
    title: "Monthly Payment Breakdown"
    dataKey: paymentBreakdown

outputs:
  - key: monthlyPayment
    label: "Monthly Payment"
    format: currency
    primary: true
  - key: totalInterest
    label: "Total Interest"
    format: currency
  - key: totalCost
    label: "Total Cost"
    format: currency
  - key: loanAmount
    label: "Loan Amount"
    format: currency

callouts:
  - title: "Lower your interest rate"
    href: "/guides/mortgage-payment"
  - title: "Increase your down payment"
    href: "/guides/rent-vs-buy"
  - title: "Compare lenders"
    href: "/guides/budget"

interpretation:
  template: mortgage
  contextLabel: "% of median US household income"

mathModule: mortgage

faqs:
  - question: "What is included in a monthly mortgage payment?"
    answer: "A mortgage payment typically includes four components known as PITI: principal (paying down the loan balance), interest (the cost of borrowing), property taxes, and homeowner's insurance. If your down payment is less than 20%, you may also pay private mortgage insurance (PMI)."
  - question: "How much house can I afford on my salary?"
    answer: "A common guideline is to keep your total housing costs below 28% of your gross monthly income. For a $75,000 salary, that means roughly $1,750 per month for mortgage, taxes, and insurance combined."
  - question: "Is a 15-year or 30-year mortgage better?"
    answer: "A 15-year mortgage saves you tens of thousands in interest but has higher monthly payments. A 30-year mortgage keeps payments affordable but costs more over time. Choose based on your monthly cash flow and long-term savings goals."
  - question: "What credit score do I need for a good mortgage rate?"
    answer: "Generally, a score of 740 or above gets you the best rates. Scores between 680-739 still qualify for competitive rates. Below 620, you may need an FHA loan, which has more flexible requirements but requires mortgage insurance."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

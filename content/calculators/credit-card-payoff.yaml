slug: credit-card-payoff
title: "Credit Card Payoff Calculator"
description: "See how long it takes to pay off your credit card and how much extra payments can save you."
category: loans

inputs:
  primary:
    - name: balance
      label: "Credit Card Balance"
      type: currency
      min: 100
      max: 100000
      step: 100
      default: 10000
      urlKey: balance
      hint: "Total balance owed"
    - name: apr
      label: "APR"
      type: percent
      min: 0
      max: 36
      step: 0.1
      default: 24
      urlKey: apr
      hint: "Check your statement"
      tooltip: "Annual Percentage Rate on your credit card. The national average is around 23%. Find yours on your monthly statement or in your card agreement."
    - name: minPaymentPct
      label: "Minimum Payment %"
      type: percent
      min: 1
      max: 5
      step: 0.5
      default: 2.5
      urlKey: minpct
      hint: "Usually 1-3%"
    - name: extraPayment
      label: "Extra Monthly Payment"
      type: currency
      min: 0
      max: 5000
      step: 25
      default: 0
      urlKey: extra
      hint: "Any amount helps"

charts:
  - type: area
    title: "Cumulative Interest Paid"
    dataKey: cumulativeInterest
  - type: area
    title: "Balance Over Time"
    dataKey: balanceOverTime

outputs:
  - key: minMonths
    label: "Months to Payoff"
    format: number
    deltaSemantic: lower_is_better
  - key: extraMonths
    label: "Months to Payoff (Extra)"
    format: number
    variant: success
    deltaSemantic: lower_is_better
  - key: monthsSaved
    label: "Months Saved"
    format: number
    primary: true
    variant: success
    deltaSemantic: higher_is_better
  - key: minTotalInterest
    label: "Interest Paid"
    format: currency
    deltaSemantic: lower_is_better
  - key: extraTotalInterest
    label: "Interest Paid (Extra)"
    format: currency
    variant: success
    deltaSemantic: lower_is_better
  - key: interestSaved
    label: "Interest Saved"
    format: currency
    variant: success
    deltaSemantic: higher_is_better

callouts:
  - title: "Compare balance transfer cards"
    href: "/compare/credit-cards"
  - title: "Should you consolidate debt?"
    href: "/guides/loan-repayment"

interpretation:
  template: credit-card-payoff
  contextLabel: "in interest savings"

mathModule: credit-card-payoff

faqs:
  - question: "How long does it take to pay off a credit card with minimum payments?"
    answer: "With a $10,000 balance at 30% APR and 2% minimum payments, the minimum payment doesn't even cover the monthly interest -- meaning the debt never gets paid off. Even at lower rates, payoff can take decades and cost more in interest than the original balance. Minimum payments are designed to maximize how much interest you pay -- even small extra payments can cut payoff time dramatically."
  - question: "What is a good strategy to pay off credit card debt?"
    answer: "The two most popular strategies are Avalanche (pay minimums on all cards, put extra money toward the highest-rate card first) and Snowball (pay minimums on all, put extra toward the smallest balance first). Avalanche saves more money; Snowball provides faster psychological wins."
  - question: "Should I transfer my balance to a 0% APR card?"
    answer: "A balance transfer can save significant interest if you can pay off the balance during the 0% promotional period (typically 12-21 months). Watch for the transfer fee (usually 3-5% of the balance) and have a plan to pay it off before the regular APR kicks in."
  - question: "Is it better to pay off credit cards or save for emergencies?"
    answer: "Build a small emergency fund first ($1,000-$2,000) to avoid adding more debt when unexpected expenses hit. Then aggressively pay down high-interest credit card debt. Once the cards are paid off, build your emergency fund to 3-6 months of expenses."

narrative:
  heroKey: monthsSaved
  heroLabel: "Months Saved With Extra Payments"
  sections:
    - label: "Payoff Timeline"
      color: blue
      content: stats
      statKeys: ["minMonths", "extraMonths", "monthsSaved"]
    - label: "Total Interest"
      color: blue
      content: stats
      statKeys: ["minTotalInterest", "extraTotalInterest", "interestSaved"]
    - label: "Cumulative Interest Paid"
      color: blue
      content: chart
      chartKey: cumulativeInterest
    - label: "Balance Over Time"
      color: blue
      content: chart
      chartKey: balanceOverTime
  tip: "Paying even $50 above the minimum each month can cut your payoff time in half and save thousands in interest."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

slug: retirement
title: "Retirement Calculator"
description: "Project your retirement savings and see if you are on track."
category: retirement

inputs:
  primary:
    - name: currentAge
      label: "Current Age"
      type: number
      min: 18
      max: 70
      step: 1
      default: 30
      urlKey: age
    - name: retirementAge
      label: "Retirement Age"
      type: number
      min: 50
      max: 80
      step: 1
      default: 65
      urlKey: retireAge
    - name: currentSavings
      label: "Current Savings"
      type: currency
      min: 0
      max: 2000000
      step: 5000
      default: 50000
      urlKey: savings
      hint: "Your current retirement balance"
    - name: monthlyContribution
      label: "Monthly Contribution"
      type: currency
      min: 0
      max: 10000
      step: 50
      default: 500
      urlKey: monthly
      hint: "Monthly 401k/IRA contribution"
    - name: expectedReturn
      label: "Expected Return"
      type: percent
      min: 1
      max: 15
      step: 0.5
      default: 7
      urlKey: returnRate
      hint: "S&P 500 avg: ~7%"
      tooltip: "Expected yearly investment growth. The S&P 500 has averaged ~7% after inflation historically, but past performance doesn't guarantee future results."
    - name: withdrawalRate
      label: "Withdrawal Rate"
      type: percent
      min: 1
      max: 10
      step: 0.5
      default: 4
      urlKey: withdrawalRate
      hint: "Safe withdrawal: 4%"
      tooltip: "The percentage of your portfolio you withdraw each year in retirement. The 4% rule suggests this rate historically sustains portfolios for 30+ years."

charts:
  - type: area
    title: "Retirement Balance Projection"
    dataKey: retirementProjection

outputs:
  - key: retirementBalance
    label: "Retirement Balance"
    format: currency
    primary: true
  - key: monthlyWithdrawal
    label: "Monthly Withdrawal"
    format: currency
  - key: annualWithdrawal
    label: "Annual Withdrawal"
    format: currency
  - key: yearsUntilDepleted
    label: "Years of Withdrawals"
    format: number
  - key: totalContributed
    label: "Total Contributed"
    format: currency

callouts:
  - title: "Maximize employer match"
    href: "/guides/retirement"
  - title: "Catch-up contributions"
    href: "/guides/compound-interest"
  - title: "Understand Social Security"
    href: "/guides/savings-goal"

interpretation:
  template: retirement
  contextLabel: "years of withdrawals at chosen rate"

mathModule: retirement

faqs:
  - question: "How much do I need to retire?"
    answer: "A common target is 25 times your annual spending (based on the 4% withdrawal rule). If you spend $50,000 per year, you'd need about $1.25 million saved. This is a starting estimate -- your actual number depends on healthcare costs, Social Security, and desired lifestyle."
  - question: "What is the 4% rule for retirement?"
    answer: "The 4% rule says you can withdraw 4% of your portfolio in the first year of retirement, then adjust for inflation each year, and your money should last at least 30 years. It's based on historical stock and bond returns. Some experts now suggest 3.5% as a more conservative target."
  - question: "When should I start saving for retirement?"
    answer: "As early as possible. Starting at 25 and saving $500/month at 7% returns gives you about $1.2 million by 65. Waiting until 35 to start would require $1,000/month to reach the same amount. Each decade of delay roughly doubles the monthly savings needed."
  - question: "Should I choose a Roth or traditional retirement account?"
    answer: "If you expect your tax rate to be higher in retirement than now, choose Roth (pay taxes now, withdraw tax-free later). If you expect a lower rate in retirement, choose traditional (deduct now, pay taxes on withdrawals later). Early career workers usually benefit more from Roth."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

slug: student-loan
title: "Student Loan Repayment Calculator"
description: "Compare standard, graduated, and income-driven repayment plans."
category: loans

inputs:
  primary:
    - name: loanBalance
      label: "Loan Balance"
      type: currency
      min: 1000
      max: 300000
      step: 1000
      default: 30000
      urlKey: balance
      hint: "Avg student debt: ~$30K"
    - name: interestRate
      label: "Interest Rate"
      type: percent
      min: 1
      max: 15
      step: 0.25
      default: 5.5
      urlKey: rate
      hint: "Federal rate: ~5.5%"
    - name: annualIncome
      label: "Annual Income"
      type: currency
      min: 0
      max: 200000
      step: 1000
      default: 55000
      urlKey: income
      hint: "For income-driven plan calc"

charts:
  - type: bar
    title: "Total Cost by Repayment Plan"
    dataKey: planComparison
  - type: line
    title: "Monthly Payment Over Time"
    dataKey: paymentOverTime

outputs:
  - key: standardMonthly
    label: "Standard Monthly"
    format: currency
    primary: true
  - key: standardTotal
    label: "Standard Total"
    format: currency
  - key: graduatedInitial
    label: "Graduated Initial"
    format: currency
  - key: graduatedTotal
    label: "Graduated Total"
    format: currency
  - key: idrMonthly
    label: "IDR Monthly"
    format: currency
  - key: idrTotal
    label: "IDR Total"
    format: currency
  - key: idrForgiven
    label: "IDR Forgiven"
    format: currency

callouts:
  - title: "Apply for forgiveness"
    href: "/guides/student-loan"
  - title: "Refinance your loans"
    href: "/guides/loan-repayment"
  - title: "Income-driven plan details"
    href: "/guides/budget"

interpretation:
  template: student-loan
  contextLabel: "repayment plan comparison"

mathModule: student-loan

faqs:
  - question: "What are the different student loan repayment plans?"
    answer: "Federal loans offer Standard (fixed payments over 10 years), Graduated (payments start low and increase every 2 years), and Income-Driven plans like SAVE (payments based on 10% of discretionary income). Private loans typically only offer standard repayment."
  - question: "Should I pay off student loans or invest?"
    answer: "If your loan rate is above 6-7%, prioritize paying it off -- guaranteed return. If below 4%, investing typically wins over time. Between 4-7%, consider splitting extra cash between both. Also factor in employer match -- always capture the full 401k match first."
  - question: "Is student loan refinancing worth it?"
    answer: "If you have good credit and stable income, refinancing can lower your rate significantly. But refinancing federal loans into private loans means losing access to income-driven repayment, forgiveness programs, and forbearance options. Only refinance federal loans if you're sure you won't need those protections."
  - question: "How does income-driven repayment work?"
    answer: "Income-driven plans cap your monthly payment at a percentage of your discretionary income (income minus 150% of the poverty line). After 20-25 years of qualifying payments, any remaining balance is forgiven. The SAVE plan caps payments at 10% of discretionary income."

narrative:
  heroKey: standardMonthly
  heroLabel: "Standard Monthly Payment"
  sections:
    - label: "Plan Comparison"
      color: orange
      content: stats
      statKeys: ["standardTotal", "graduatedTotal", "idrTotal"]
    - label: "Total Cost by Plan"
      color: blue
      content: chart
      chartKey: planComparison
  tip: "Income-driven plans lower your monthly payment but may cost more over time. Compare total cost, not just monthly amounts."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

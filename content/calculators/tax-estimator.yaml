slug: tax-estimator
title: "Tax Estimator"
description: "Estimate your federal tax liability by income and filing status."
category: tax

inputs:
  primary:
    - name: annualIncome
      label: "Annual Income"
      type: currency
      min: 0
      max: 1000000
      step: 1000
      default: 75000
      urlKey: income
      hint: "Gross annual income"
    - name: filingStatus
      label: "Filing Status"
      type: select
      min: 0
      max: 0
      step: 0
      default: 0
      urlKey: filing
      hint: "Your tax filing status"
      options:
        - value: "single"
          label: "Single"
        - value: "married"
          label: "Married Filing Jointly"
        - value: "head"
          label: "Head of Household"
    - name: standardDeduction
      label: "Standard Deduction"
      type: currency
      min: 0
      max: 50000
      step: 100
      default: 15700
      urlKey: deduction
      hint: "2026 single: ~$15,700"
      tooltip: "The amount of income you can earn tax-free. The IRS adjusts this annually. Most filers use the standard deduction rather than itemizing."

charts:
  - type: bar
    title: "Tax by Bracket"
    dataKey: brackets
  - type: pie
    title: "Tax vs Take Home"
    dataKey: breakdown

outputs:
  - key: totalTax
    label: "Total Federal Tax"
    format: currency
    primary: true
  - key: effectiveRate
    label: "Effective Rate"
    format: percent
  - key: marginalRate
    label: "Marginal Rate"
    format: percent
  - key: takeHome
    label: "Take Home"
    format: currency
  - key: taxableIncome
    label: "Taxable Income"
    format: currency

callouts:
  - title: "Maximize deductions"
    href: "/guides/tax-estimator"
  - title: "Adjust withholding"
    href: "/guides/budget"
  - title: "Plan quarterly payments"
    href: "/guides/retirement"

interpretation:
  template: tax
  contextLabel: "effective vs marginal tax rate"

mathModule: tax

faqs:
  - question: "How do tax brackets work?"
    answer: "Tax brackets are progressive -- you don't pay one flat rate on all your income. Each bracket only applies to income within that range. If you earn $100,000 as a single filer, you pay 10% on the first ~$11,600, 12% on the next chunk, 22% on the next, and 24% on the amount above ~$95,000."
  - question: "What is the standard deduction for 2026?"
    answer: "The projected 2026 standard deduction is approximately $15,700 for single filers, $31,400 for married filing jointly, and $23,050 for head of household. These amounts are adjusted annually for inflation."
  - question: "Should I itemize or take the standard deduction?"
    answer: "Itemize only if your total deductions (mortgage interest, state/local taxes up to $10,000, charitable donations, medical expenses above 7.5% of AGI) exceed the standard deduction. Since the 2018 tax reform doubled the standard deduction, roughly 90% of filers benefit from taking the standard deduction."
  - question: "What is the difference between a tax deduction and a tax credit?"
    answer: "A deduction reduces your taxable income. A $1,000 deduction in the 22% bracket saves you $220. A credit reduces your actual tax bill dollar-for-dollar. A $1,000 credit saves you exactly $1,000. Credits are more valuable than deductions of the same amount."

narrative:
  heroKey: takeHome
  heroLabel: "Your Take-Home Pay"
  sections:
    - label: "Tax Summary"
      color: red
      content: stats
      statKeys: ["totalTax", "effectiveRate", "marginalRate"]
    - label: "Tax by Bracket"
      color: orange
      content: chart
      chartKey: brackets
  showDetailTable: true

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

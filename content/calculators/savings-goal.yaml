slug: savings-goal
title: "Savings Goal Calculator"
description: "Find out how much to save each month to reach your target."
category: savings

inputs:
  primary:
    - name: goalAmount
      label: "Goal Amount"
      type: currency
      min: 1000
      max: 1000000
      step: 1000
      default: 50000
      urlKey: goal
      hint: "Your target amount"
    - name: currentSavings
      label: "Current Savings"
      type: currency
      min: 0
      max: 500000
      step: 500
      default: 5000
      urlKey: current
      hint: "What you have now"
    - name: annualReturn
      label: "Annual Return"
      type: percent
      min: 0
      max: 15
      step: 0.25
      default: 4.5
      urlKey: rate
      hint: "HYSA rate: ~4.5%"
      tooltip: "Expected annual interest or return on your savings. High-yield savings accounts (HYSAs) currently offer ~4-5%. Investments may earn more but with higher risk."
    - name: timeHorizon
      label: "Time Horizon"
      type: years
      min: 1
      max: 30
      step: 1
      default: 5
      urlKey: years
    - name: monthlySavings
      label: "Monthly Savings"
      type: currency
      min: 0
      max: 10000
      step: 50
      default: 0
      urlKey: monthly
      hint: "0 = auto (minimum required)"
      tooltip: "Set to 0 to auto-calculate the minimum. Increase to see how saving more shortens your timeline."

charts:
  - type: line
    title: "Savings Progress"
    dataKey: savingsProgress

outputs:
  - key: monthlyRequired
    label: "Monthly Savings Required"
    format: currency
    primary: true
  - key: yearsToGoal
    label: "Years to Goal"
    format: number
  - key: projectedTotal
    label: "Projected Total"
    format: currency
  - key: totalContributed
    label: "Total Contributed"
    format: currency
  - key: interestEarned
    label: "Interest Earned"
    format: currency

callouts:
  - title: "Automate your savings"
    href: "/guides/savings-goal"
  - title: "High-yield accounts"
    href: "/guides/compound-interest"
  - title: "Set milestone rewards"
    href: "/guides/budget"

interpretation:
  template: savings-goal
  contextLabel: "interest earned"

mathModule: savings

faqs:
  - question: "How much should I have in an emergency fund?"
    answer: "Most financial advisors recommend 3-6 months of essential expenses. If your monthly needs are $3,000, aim for $9,000-$18,000. If your income is variable (freelancer, commission-based), lean toward 6-12 months for extra security."
  - question: "Where should I keep my savings?"
    answer: "For short-term goals (1-3 years): a high-yield savings account or CD for safety and liquidity. For medium-term goals (3-10 years): a mix of bonds and conservative index funds. For long-term goals (10+ years): index fund investments that can ride out market volatility."
  - question: "How can I save money when I'm living paycheck to paycheck?"
    answer: "Start with any amount -- even $25 per paycheck. Automate the transfer so it happens before you can spend it. Review subscriptions for cuts, use cashback apps for groceries, and consider a temporary side income. Small consistent savings build faster than you'd expect thanks to compound interest."
  - question: "What's the difference between saving and investing?"
    answer: "Saving means putting money in safe, accessible accounts (savings accounts, CDs) with low but guaranteed returns. Investing means buying assets like stocks or bonds with higher potential returns but also risk of loss. Use saving for short-term goals and investing for long-term goals."

seo:
  schemaType: WebApplication
  applicationCategory: FinanceApplication

terms:
  - term: APR
    slug: apr
    definition: "Annual Percentage Rate -- the total yearly cost of borrowing, including interest and fees, expressed as a percentage."
    longDefinition: "APR includes the interest rate plus any additional fees charged by the lender (origination fees, closing costs, etc.), giving you a more complete picture of what a loan actually costs compared to the interest rate alone."
  - term: DTI
    slug: dti
    definition: "Debt-to-Income ratio -- the percentage of your gross monthly income that goes toward debt payments."
    longDefinition: "Lenders use DTI to assess your ability to manage monthly payments. Most mortgage lenders prefer a DTI below 43%, with many preferring 36% or less."
  - term: Amortization
    slug: amortization
    definition: "The process of spreading a loan into a series of fixed payments over time, where each payment covers both principal and interest."
  - term: Principal
    slug: principal
    definition: "The original amount of money borrowed in a loan, not including interest."
  - term: Interest
    slug: interest
    definition: "The cost of borrowing money, usually expressed as an annual percentage of the loan balance."
  - term: Escrow
    slug: escrow
    definition: "A third-party account where funds are held during a transaction, commonly used for property taxes and insurance in mortgage payments."
  - term: PMI
    slug: pmi
    definition: "Private Mortgage Insurance -- extra insurance you pay when your down payment is less than 20% of the home price. It protects the lender, not you."
  - term: Equity
    slug: equity
    definition: "The portion of your home that you actually own -- the difference between your home's value and what you still owe on the mortgage."
  - term: Pre-approval
    slug: pre-approval
    definition: "A lender's conditional commitment to lend you a specific amount, based on a review of your credit, income, and assets. Stronger than pre-qualification."
  - term: Closing Costs
    slug: closing-costs
    definition: "Fees and expenses you pay when finalizing a real estate transaction, typically 2-5% of the home price. Includes appraisal, title insurance, and attorney fees."
  - term: Credit Score
    slug: credit-score
    definition: "A three-digit number (300-850) that represents your creditworthiness. Higher scores get better loan rates and terms."
  - term: Down Payment
    slug: down-payment
    definition: "The upfront cash you pay when purchasing a home or car, expressed as a percentage of the total price."
  - term: Fixed Rate
    slug: fixed-rate
    definition: "An interest rate that stays the same for the entire life of the loan, making your monthly payments predictable."
  - term: Variable Rate
    slug: variable-rate
    definition: "An interest rate that can change periodically based on market conditions, meaning your payments may go up or down over time."
  - term: Compound Interest
    slug: compound-interest
    definition: "Interest calculated on both the initial principal and the accumulated interest from previous periods -- your money earning money on its money."
  - term: Inflation
    slug: inflation
    definition: "The rate at which prices for goods and services increase over time, reducing the purchasing power of your money."
  - term: Net Worth
    slug: net-worth
    definition: "The total value of everything you own (assets) minus everything you owe (liabilities). A snapshot of your financial health."
  - term: Gross Income
    slug: gross-income
    definition: "Your total income before taxes and other deductions are taken out. This is the number lenders and landlords typically use."
  - term: Deduction
    slug: deduction
    definition: "An expense that reduces your taxable income. Standard deduction is a flat amount; itemized deductions are specific expenses like mortgage interest or charitable donations."
  - term: Filing Status
    slug: filing-status
    definition: "Your tax category based on marital and family status (single, married filing jointly, head of household, etc.) that determines your tax brackets and standard deduction."
  - term: Tax Bracket
    slug: tax-bracket
    definition: "The range of income taxed at a particular rate. The US uses progressive brackets, so only the income within each range is taxed at that range's rate."
  - term: Emergency Fund
    slug: emergency-fund
    definition: "Money set aside for unexpected expenses like medical bills, car repairs, or job loss. Most experts recommend 3-6 months of living expenses."
  - term: Opportunity Cost
    slug: opportunity-cost
    definition: "The potential gain you miss out on when choosing one option over another. For example, money used for a down payment could have been invested in the stock market."
  - term: Refinancing
    slug: refinancing
    definition: "Replacing an existing loan with a new one, usually to get a lower interest rate, reduce monthly payments, or change the loan term."
  - term: Index Fund
    slug: index-fund
    definition: "A type of investment fund that tracks a market index like the S&P 500, offering broad diversification at low cost. A popular choice for long-term investing."
  - term: FICO Score
    slug: fico-score
    definition: "The most widely used credit scoring model, ranging from 300 to 850, developed by Fair Isaac Corporation."
  - term: Balance Transfer
    slug: balance-transfer
    definition: "Moving debt from one credit card to another, typically to take advantage of a lower interest rate or 0% promotional APR."
  - term: Minimum Payment
    slug: minimum-payment
    definition: "The smallest amount you must pay on a credit card balance each month to avoid penalties -- usually 1-3% of the balance or a flat $25, whichever is greater."
  - term: Auto Loan
    slug: auto-loan
    definition: "A fixed-term loan used to purchase a vehicle, with the car serving as collateral. Typical terms range from 36 to 72 months."
  - term: Front-End Ratio
    slug: front-end-ratio
    definition: "The percentage of your gross monthly income that goes toward housing costs (mortgage, taxes, insurance). Lenders typically prefer 28% or less."
  - term: Back-End Ratio
    slug: back-end-ratio
    definition: "The percentage of your gross monthly income that goes toward all monthly debt payments combined. Lenders typically prefer 36% or less."
  - term: Pre-Qualification
    slug: pre-qualification
    definition: "A preliminary estimate of how much a lender might offer you, based on self-reported financial information. Less rigorous than pre-approval."
  - term: APY
    slug: apy
    definition: "Annual Percentage Yield -- the total amount of interest earned on a savings account in one year, including the effect of compound interest."
  - term: "CD (Certificate of Deposit)"
    slug: certificate-of-deposit
    definition: "A savings product that pays a fixed interest rate for a set period (3 months to 5 years). Higher rates than regular savings but your money is locked until maturity."
  - term: "401(k)"
    slug: 401k
    definition: "An employer-sponsored retirement savings plan that lets you contribute pre-tax dollars, often with an employer match. Contribution limit is $23,500 in 2026."
  - term: Roth IRA
    slug: roth-ira
    definition: "An individual retirement account funded with after-tax dollars. Withdrawals in retirement are tax-free. Income limits apply for contributions."
  - term: Traditional IRA
    slug: traditional-ira
    definition: "An individual retirement account funded with pre-tax dollars (tax-deductible contributions). Withdrawals in retirement are taxed as ordinary income."
  - term: Marginal Tax Rate
    slug: marginal-tax-rate
    definition: "The tax rate applied to your last dollar of income -- the highest bracket your income falls into. Not the rate you pay on all your income."
  - term: Effective Tax Rate
    slug: effective-tax-rate
    definition: "The average rate at which your total income is taxed, calculated by dividing total tax paid by total income. Always lower than your marginal rate."
  - term: FDIC Insurance
    slug: fdic-insurance
    definition: "Federal Deposit Insurance Corporation coverage that protects bank deposits up to $250,000 per depositor, per bank, per ownership category."
  - term: Depreciation
    slug: depreciation
    definition: "The decrease in an asset's value over time. New cars typically depreciate 20-30% in the first two years of ownership."
  - term: Liquidity
    slug: liquidity
    definition: "How easily an asset can be converted to cash without losing value. Savings accounts are highly liquid; real estate is not."
  - term: Collateral
    slug: collateral
    definition: "An asset pledged as security for a loan. If you default on the loan, the lender can seize the collateral -- your home for a mortgage, your car for an auto loan."
  - term: Forbearance
    slug: forbearance
    definition: "A temporary pause or reduction in loan payments granted by a lender during financial hardship. Interest usually continues to accrue during forbearance."
  - term: Asset Allocation
    slug: asset-allocation
    definition: "How you divide your investments among different asset categories like stocks, bonds, and cash. Your ideal mix depends on your age, goals, and risk tolerance."
  - term: Diversification
    slug: diversification
    definition: "Spreading investments across different assets to reduce risk. If one investment drops, others may hold steady or grow, protecting your overall portfolio."
  - term: Capital Gains
    slug: capital-gains
    definition: "The profit from selling an investment or property for more than you paid. Short-term gains (held less than a year) are taxed higher than long-term gains."
  - term: Debt Consolidation
    slug: debt-consolidation
    definition: "Combining multiple debts into a single loan, usually to get a lower interest rate or simplify payments. Common for credit card and student loan debt."
  - term: Lien
    slug: lien
    definition: "A legal claim on an asset as security for a debt. A mortgage is a lien on your home; an auto loan creates a lien on your car."
  - term: Underwriting
    slug: underwriting
    definition: "The process a lender uses to evaluate your financial profile and determine whether to approve your loan application and at what terms."
  - term: Adjustable Rate Mortgage
    slug: adjustable-rate-mortgage
    definition: "A mortgage with an interest rate that changes after an initial fixed period. Often starts lower than fixed rates but carries risk of future increases."
  - term: Grace Period
    slug: grace-period
    definition: "The time between the end of a billing cycle and the payment due date during which no interest is charged. Credit cards typically offer 21-25 days."

editorialTitle: "New York Paycheck Calculator 2026"
editorialDescription: "Calculate your New York take-home pay. NY has 9 brackets up to 10.90%. NYC adds 3-3.9% more. See how state and city taxes combine to affect your pay."
editorialContent: |
  New York state levies a graduated income tax with nine brackets, ranging from 4.00% to 10.90%. The top rates of 9.65% to 10.90% apply to very high incomes (above $1,077,550 for single filers), while most New Yorkers earning between $80,000 and $215,000 fall in the 6.00% bracket. New York's bracket thresholds differ by filing status, with married couples receiving wider brackets.

  New York has its own standard deduction of $8,000 for single filers and $16,050 for married filing jointly, lower than the federal amounts. Dependent exemptions are $1,000 per qualifying dependent. New York's taxable income calculation starts from federal AGI with New York-specific modifications.

  A critical consideration for New York residents is that New York City and Yonkers impose their own additional income taxes. NYC has four brackets ranging from 3.078% to 3.876%. Combined with state rates, NYC residents can face a total state-plus-city marginal rate of 10.726% (on income around $80K-$215K) to 14.776% (at the top). Yonkers imposes a surcharge of 16.75% of the net state tax. These city taxes make New York City one of the most heavily taxed jurisdictions in the country for income earners.

  New York fully exempts Social Security benefits and government pensions (federal, New York state, and local) from state income tax. Private pensions and 401(k)/IRA distributions are taxable, but taxpayers 59-1/2 and older can exclude up to $20,000 of private pension and annuity income. Military retirement pay is fully exempt.

  The state sales tax rate is 4.00% with local additions bringing the average combined rate to approximately 8.52%. Groceries and prescription drugs are exempt. NYC's combined rate is 8.875%. Clothing and footwear under $110 per item are exempt from state and NYC sales tax.

  Property taxes in New York vary enormously. Westchester, Nassau, and Rockland counties have effective rates exceeding 2%, while NYC's effective rate is lower at about 0.88% (though applied to very high property values). Upstate New York has moderate to high rates depending on the school district. The STAR program provides property tax relief for primary residences.

faqs:
  - question: "What is New York's top income tax rate?"
    answer: "10.90% on income over $25 million. The 9.65% rate kicks in at $1,077,550 (single). Most workers earning $80K-$215K are in the 6.00% bracket."
  - question: "Does NYC have its own income tax?"
    answer: "Yes. NYC adds 3.078% to 3.876% on top of state rates. The combined state-plus-city top rate in NYC can reach 14.776%."
  - question: "Does New York tax Social Security?"
    answer: "No. Social Security and government pensions are fully exempt. Taxpayers 59-1/2+ can exclude up to $20,000 of private pension/annuity income."
  - question: "Does New York tax clothing?"
    answer: "Clothing and footwear under $110 per item are exempt from state and NYC sales tax."


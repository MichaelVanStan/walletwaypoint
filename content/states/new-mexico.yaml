editorialTitle: "New Mexico Paycheck Calculator 2026"
editorialDescription: "Calculate your New Mexico take-home pay with graduated rates up to 5.90%. NM exempts Social Security and has a low cost of living. See the details."
editorialContent: |
  New Mexico levies a graduated income tax with six brackets, ranging from 1.70% to 5.90%. The top rate of 5.90% applies to income over $315,000 for single filers and $420,000 for married couples. For most workers, the 4.90% rate (which applies from $16,000 to $210,000 single) is the effective marginal rate.

  New Mexico conforms to the federal standard deduction ($14,600 single, $29,200 married filing jointly). The state provides a dependent exemption of $4,150 per qualifying dependent but does not offer a personal exemption for the taxpayer or spouse. New Mexico uses federal adjusted gross income as the starting point.

  New Mexico fully exempts Social Security benefits from state income tax. The state also provides generous tax relief for lower-income seniors: the Low Income Comprehensive Tax Rebate provides a refundable credit for residents with income below $36,000. New Mexico does not tax military retirement pay for veterans with 20+ years of service or who are medically retired.

  New Mexico levies a Gross Receipts Tax (GRT) instead of a traditional sales tax. The state rate is 4.875% with local additions bringing the average combined rate to approximately 7.72%. Unlike a traditional sales tax, the GRT applies to services as well as goods, including professional services, construction, and healthcare. Groceries were made exempt from the state portion of the GRT effective 2025.

  Property taxes in New Mexico are among the lowest in the nation, with an average effective rate of approximately 0.67%. A generous head-of-family exemption and veteran's exemption reduce the assessed value for qualifying homeowners. The 33-1/3% assessment ratio further reduces the effective tax burden on residential property.

  New Mexico's cost-of-living index is approximately 91, about 9% below the national average. Albuquerque is the largest city and offers affordable living with access to healthcare, education (University of New Mexico), and the Sandia National Laboratories job market. Santa Fe, while more expensive than Albuquerque, remains more affordable than comparable artistic and cultural cities.

faqs:
  - question: "What are New Mexico's income tax rates?"
    answer: "Six brackets from 1.70% to 5.90%. Most workers fall in the 4.90% bracket ($16K-$210K single). The top rate applies above $315,000 single."
  - question: "Does New Mexico tax Social Security?"
    answer: "No. Social Security benefits are fully exempt from New Mexico income tax."
  - question: "What is the Gross Receipts Tax?"
    answer: "New Mexico's equivalent of a sales tax, averaging about 7.72% combined. It applies to goods, services, and construction — broader than a typical sales tax. Groceries are exempt from the state portion."
  - question: "Are New Mexico property taxes low?"
    answer: "Yes. The average effective rate is about 0.67%, among the lowest nationally, thanks to assessment ratios and generous exemptions."


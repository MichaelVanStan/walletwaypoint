name: "First Home Buyer"
tagline: "Your roadmap from dreaming to closing day"
description: "Everything you need to understand mortgages, save for a down payment, and make your first home purchase with confidence."
icon: Home
accentColor: "oklch(0.55 0.12 175)"
intro: "Buying your first home is one of the biggest financial decisions you will ever make. This hub walks you through the mortgage math, helps you figure out how much to save, and gives you the tools to compare renting versus buying -- so you can make the call with confidence, not anxiety."


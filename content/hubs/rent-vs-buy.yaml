tips:
  - title: "Calculate your break-even point"
    description: "The rent-vs-buy calculation changes dramatically based on how long you plan to stay. Buying typically wins after 5-7 years."
  - title: "Don't forget opportunity cost"
    description: "Money locked in a down payment could be invested elsewhere. Our calculator factors this in."
  - title: "Factor in lifestyle flexibility"
    description: "Renting offers mobility. If your career or life plans might shift in the next few years, that flexibility has real value."
  - title: "Consider your local market"
    description: "Price-to-rent ratios vary wildly by city. In some markets renting is clearly better; in others, buying wins easily."


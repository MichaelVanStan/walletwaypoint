slug: new-parents
name: "New Parents / Growing Family"
tagline: "Your family's financial foundation"
description: "Starting or growing a family? Plan for the costs of raising a child, protect your family with the right insurance, and build a budget that works for your new normal."
icon: Baby
accentColor: "oklch(0.55 0.12 320)"
intro: "Congratulations on the new addition to your family! A baby changes everything -- including your finances. Whether you are planning ahead or already in the thick of diapers and doctor visits, this hub gives you the tools and guides to build a financial foundation that works for your growing family."


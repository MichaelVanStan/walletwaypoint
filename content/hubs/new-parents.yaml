tips:
  - title: "Update your health insurance now"
    description: "A new baby is a qualifying life event. You have 30-60 days to add your child to your plan -- don't miss the window."
  - title: "Start a 529 plan early"
    description: "Even small contributions grow significantly over 18 years. Starting at birth gives compound interest maximum time to work."
  - title: "Update your beneficiaries"
    description: "Review life insurance, retirement accounts, and bank accounts to make sure your child is protected."
  - title: "Build a baby emergency fund"
    description: "Kids bring unexpected expenses. Aim for an extra $1,000-2,000 on top of your regular emergency fund for pediatric visits, gear, and surprises."


tips:
  - title: "Know your number"
    description: "Most financial planners suggest you will need 70-80% of your pre-retirement income annually. Use our calculator to get your specific target."
  - title: "Understand the 4% rule"
    description: "The classic guideline suggests withdrawing 4% of your portfolio in year one, then adjusting for inflation. It is a starting point, not a guarantee."
  - title: "Delay Social Security if you can"
    description: "Benefits increase roughly 8% for each year you delay past 62, up to age 70. That's a guaranteed return hard to beat."
  - title: "Plan for healthcare costs"
    description: "Medicare starts at 65, but it does not cover everything. Budget for supplemental insurance, dental, vision, and potential long-term care."


slug: pre-retirement
name: "Pre-Retirement"
tagline: "Make your money last as long as you do"
description: "Approaching retirement? Estimate how much you need, understand withdrawal strategies, and plan for the transition from saving to spending."
icon: Landmark
accentColor: "oklch(0.40 0.1 245)"
intro: "You have spent decades saving. Now the question shifts from 'How much should I save?' to 'How much can I spend?' This hub helps you estimate your retirement needs, understand how compound interest works in your favor (and against you through inflation), and build a savings strategy for the final stretch."


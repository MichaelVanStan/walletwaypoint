slug: wedding-marriage
name: "Wedding / Marriage / Combining Finances"
tagline: "Build your financial partnership"
description: "Getting married? From wedding budgets to combining bank accounts to filing taxes jointly, navigate the financial side of your partnership with confidence."
icon: Heart
accentColor: "oklch(0.55 0.15 350)"
intro: "Marriage is one of the biggest financial events of your life -- and it goes far beyond the wedding day. From deciding how to merge (or not merge) bank accounts to understanding how your taxes change, this hub helps you build a financial partnership that is as strong as your personal one."


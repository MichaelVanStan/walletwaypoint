tips:
  - title: "Have the money talk before the wedding"
    description: "Discuss debts, spending habits, and financial goals openly. Money is the number one source of conflict in marriages -- transparency prevents surprises."
  - title: "Compare MFJ vs MFS filing"
    description: "Married Filing Jointly usually saves money, but not always. Run the numbers both ways, especially if one spouse has student loans on an income-driven plan."
  - title: "Set a realistic wedding budget"
    description: "The average wedding costs over $30,000, but yours doesn't have to. Decide what matters most to you both and allocate accordingly."
  - title: "Decide on a banking system together"
    description: "Joint accounts, separate accounts, or a hybrid? There is no wrong answer -- but you both need to agree on a system and stick to it."


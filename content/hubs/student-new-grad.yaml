slug: student-new-grad
name: "Student / New Grad"
tagline: "Your post-graduation money roadmap"
description: "Just graduated? Here's everything you need to tackle student loans, build your first budget, and start saving -- even on an entry-level salary."
icon: GraduationCap
accentColor: "oklch(0.55 0.12 145)"
intro: "Just graduated? Congrats -- and welcome to the real world of money. Whether you are staring down student loans, figuring out your first paycheck, or wondering how to start saving, this hub has the tools and guides to help you build a solid financial foundation from day one."

calculatorSlugs:
  - student-loan
  - budget

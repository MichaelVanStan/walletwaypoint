tips:
  - title: "Start with your student loans"
    description: "Know your repayment options before your grace period ends. Income-driven plans can make payments manageable."
  - title: "Build a simple budget"
    description: "The 50/30/20 rule is a great starting point: 50% needs, 30% wants, 20% savings and debt repayment."
  - title: "Open a high-yield savings account"
    description: "Even $50/month adds up. Start building an emergency fund before you need one."
  - title: "Take the employer 401(k) match"
    description: "If your employer matches retirement contributions, that's free money. Contribute at least enough to get the full match."

